name: Test
on:
  push:
    branches:
      - main
      - next
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: yarn
    - run: yarn install
    - run: yarn test
